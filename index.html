<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2-Week Gym Plan</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    padding: 24px 20px 16px;
    text-align: center;
    border-bottom: 2px solid #e94560;
    position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-size: 1.6rem; color: #fff; letter-spacing: 1px; }
  header p { color: #888; font-size: 0.85rem; margin-top: 4px; }

  .week-switch {
    display: flex; justify-content: center; gap: 10px;
    padding: 12px 10px 8px; background: #0f0f1a;
    position: sticky; top: 82px; z-index: 99;
  }
  .week-btn {
    padding: 8px 18px; border-radius: 20px; cursor: pointer;
    background: #1a1a2e; border: 1px solid #2a2a4a;
    color: #aaa; font-weight: 700; font-size: 0.85rem;
    transition: all 0.25s;
  }
  .week-btn.active { background: #4fc3f7; color: #0f0f1a; border-color: #4fc3f7; }
  .reset-btn {
    padding: 8px 14px; border-radius: 20px; cursor: pointer;
    background: transparent; border: 1px solid #e94560;
    color: #e94560; font-weight: 700; font-size: 0.8rem;
    transition: all 0.25s;
  }
  .reset-btn:hover { background: #e94560; color: #fff; }

  .tabs {
    display: flex; justify-content: center; gap: 6px;
    padding: 8px 10px 12px; flex-wrap: wrap;
    background: #0f0f1a; position: sticky; top: 128px; z-index: 98;
  }
  .tab {
    padding: 10px 14px; border-radius: 8px; cursor: pointer;
    background: #1a1a2e; border: 1px solid #2a2a4a; font-size: 0.78rem;
    color: #aaa; transition: all 0.25s; font-weight: 600;
  }
  .tab:hover { border-color: #e94560; color: #fff; }
  .tab.active { background: #e94560; color: #fff; border-color: #e94560; }
  .tab .day-label { display: block; font-size: 0.62rem; font-weight: 400; opacity: 0.8; }

  .day-content { display: none; padding: 10px 16px 40px; max-width: 700px; margin: 0 auto; }
  .day-content.active { display: block; }

  .day-header {
    text-align: center; margin: 10px 0 20px;
    padding: 16px; border-radius: 12px;
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border: 1px solid #2a2a4a;
  }
  .day-header h2 { color: #e94560; font-size: 1.3rem; }
  .day-header .muscles-targeted { color: #888; font-size: 0.8rem; margin-top: 4px; }
  .day-header .duration { color: #4fc3f7; font-size: 0.75rem; margin-top: 6px; font-weight: 600; }

  .exercise-card {
    background: #1a1a2e; border-radius: 12px; padding: 16px;
    margin-bottom: 14px; border: 1px solid #2a2a4a;
    transition: border-color 0.3s;
  }
  .exercise-card:hover { border-color: #e94560; }
  .exercise-card .exercise-top { display: flex; gap: 14px; align-items: flex-start; flex-wrap: wrap; }
  .equip-img {
    width: 200px; height: 200px; flex-shrink: 0;
    background: #0f0f1a; border-radius: 10px; overflow: hidden;
    border: 1px solid #2a2a4a; margin-left: auto;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
    position: relative;
  }
  .equip-img img {
    width: 100%; height: 100%; object-fit: cover;
    position: absolute; top: 0; left: 0;
    border-radius: 10px;
  }
  .equip-label {
    font-size: 0.6rem; color: #fff; text-align: center;
    white-space: nowrap; position: relative; z-index: 1;
    background: rgba(0,0,0,0.7); padding: 2px 6px; border-radius: 0 0 9px 9px;
    width: 100%;
  }

  .muscle-img {
    width: 90px; height: 90px; flex-shrink: 0;
    background: #0f0f1a; border-radius: 10px; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid #2a2a4a;
  }
  .muscle-img svg { width: 80px; height: 80px; }

  .exercise-info { flex: 1; min-width: 180px; }
  .exercise-info h3 { font-size: 1rem; color: #fff; margin-bottom: 4px; }
  .exercise-info .muscle-name { font-size: 0.75rem; color: #e94560; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

  .sets-reps {
    display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap;
  }
  .sets-reps .badge {
    padding: 6px 12px; border-radius: 6px; font-size: 0.78rem; font-weight: 600;
  }
  .badge.sets { background: #162447; color: #4fc3f7; }
  .badge.reps { background: #1b2a1b; color: #81c784; }
  .badge.rest { background: #2a1b2a; color: #ce93d8; }

  .exercise-note {
    margin-top: 10px; font-size: 0.78rem; color: #777;
    padding-left: 10px; border-left: 2px solid #333;
  }

  .weight-row {
    display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap;
  }
  .weight-box {
    flex: 1; min-width: 130px;
    background: #0f0f1a;
    border: 1px solid #2a2a4a;
    border-radius: 8px;
    padding: 8px 10px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .weight-box .weight-label {
    font-size: 0.68rem; color: #888; text-transform: uppercase;
    letter-spacing: 0.5px; font-weight: 700;
  }
  .weight-box.start { border-left: 3px solid #4fc3f7; }
  .weight-box.last { border-left: 3px solid #81c784; }
  .weight-box.start .weight-label { color: #4fc3f7; }
  .weight-box.last .weight-label { color: #81c784; }
  .weight-select {
    background: #1a1a2e;
    color: #fff;
    border: 1px solid #2a2a4a;
    border-radius: 6px;
    padding: 6px 8px;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    outline: none;
    width: 100%;
  }
  .weight-select:focus { border-color: #e94560; }
  .weight-select option { background: #1a1a2e; }

  .progress-row {
    display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; align-items: center;
  }
  .set-check {
    width: 32px; height: 32px; border-radius: 6px; border: 2px solid #333;
    background: transparent; color: #555; font-size: 0.75rem; font-weight: 700;
    cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center;
  }
  .set-check.done { background: #e94560; border-color: #e94560; color: #fff; }

  .rest-btn {
    padding: 6px 12px; border-radius: 6px; cursor: pointer;
    background: #2a1b2a; border: 1px solid #ce93d8;
    color: #ce93d8; font-size: 0.75rem; font-weight: 700;
    transition: all 0.2s; margin-left: auto;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .rest-btn:hover { background: #ce93d8; color: #1a1a2e; }
  .rest-btn.running { background: #ce93d8; color: #1a1a2e; animation: pulse 1s infinite; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  /* Rest Timer Modal */
  .timer-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    display: none; align-items: center; justify-content: center;
    z-index: 1000; backdrop-filter: blur(6px);
  }
  .timer-overlay.active { display: flex; }
  .timer-box {
    background: linear-gradient(135deg, #1a1a2e, #2a1b2a);
    border: 2px solid #ce93d8; border-radius: 20px;
    padding: 32px 40px; text-align: center; min-width: 280px;
    box-shadow: 0 20px 60px rgba(206, 147, 216, 0.3);
  }
  .timer-label { color: #ce93d8; font-size: 0.9rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
  .timer-display { font-size: 4.5rem; color: #fff; font-weight: 800; margin: 16px 0; font-variant-numeric: tabular-nums; }
  .timer-exercise { color: #888; font-size: 0.85rem; margin-bottom: 20px; }
  .timer-actions { display: flex; gap: 10px; justify-content: center; }
  .timer-action-btn {
    padding: 10px 18px; border-radius: 8px; cursor: pointer;
    border: 1px solid #ce93d8; background: transparent;
    color: #ce93d8; font-weight: 700; font-size: 0.85rem;
    transition: all 0.2s;
  }
  .timer-action-btn:hover { background: #ce93d8; color: #1a1a2e; }
  .timer-action-btn.danger { border-color: #e94560; color: #e94560; }
  .timer-action-btn.danger:hover { background: #e94560; color: #fff; }

  footer {
    text-align: center; padding: 16px 20px 24px; color: #888; font-size: 0.85rem;
    border-top: 1px solid #2a2a4a;
    position: sticky; bottom: 0; background: #0f0f1a; z-index: 99;
  }
  .progress-bar-wrap {
    max-width: 400px; margin: 0 auto 8px; height: 8px;
    background: #1a1a2e; border-radius: 4px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; background: linear-gradient(90deg, #e94560, #4fc3f7);
    border-radius: 4px; transition: width 0.3s;
  }
  .progress-text { font-weight: 600; }
  .progress-text .done-count { color: #e94560; }
  .progress-text .total-count { color: #4fc3f7; }

  /* Spine & Sciatic section */
  .spine-section {
    margin-top: 24px;
    padding: 18px;
    border-radius: 14px;
    background: linear-gradient(135deg, #122225, #0f1f2a);
    border: 1px solid #2a4a4a;
  }
  .spine-section h3 {
    color: #4fc3f7;
    font-size: 1rem;
    margin-bottom: 4px;
    display: flex; align-items: center; gap: 8px;
  }
  .spine-section .spine-subtitle {
    font-size: 0.78rem; color: #888; margin-bottom: 14px;
  }
  .spine-card {
    background: #0f1a22;
    border: 1px solid #234040;
    border-left: 3px solid #4fc3f7;
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .spine-card .spine-head {
    display: flex; justify-content: space-between; align-items: center;
    gap: 10px; flex-wrap: wrap;
  }
  .spine-img {
    width: 110px; height: 65px; flex-shrink: 0;
    background: #0a1218; border-radius: 8px;
    border: 1px solid #234040;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .spine-img svg { width: 100%; height: 100%; display: block; }
  .spine-card h4 { color: #fff; font-size: 0.92rem; }
  .spine-card .spine-target {
    font-size: 0.7rem; color: #4fc3f7; text-transform: uppercase;
    letter-spacing: 0.5px; font-weight: 700;
  }
  .spine-card p {
    color: #999; font-size: 0.8rem; line-height: 1.5; margin-top: 6px;
  }
  .spine-card .spine-dose {
    display: inline-block; padding: 4px 10px; border-radius: 6px;
    background: #1a2a35; color: #4fc3f7;
    font-size: 0.72rem; font-weight: 700; margin-top: 8px;
  }
  .spine-card .spine-check {
    width: 26px; height: 26px; border-radius: 6px; border: 2px solid #2a4040;
    background: transparent; color: #4a7080; font-size: 0.7rem; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
  }
  .spine-check.done { background: #4fc3f7; border-color: #4fc3f7; color: #0f1a22; }

  /* Warm-up section */
  .warmup-section {
    margin-bottom: 24px;
    padding: 18px;
    border-radius: 14px;
    background: linear-gradient(135deg, #251a08, #1e1608);
    border: 1px solid #4a3a14;
  }
  .warmup-section h3 {
    color: #ffb74d;
    font-size: 1rem;
    margin-bottom: 4px;
    display: flex; align-items: center; gap: 8px;
  }
  .warmup-section .warmup-subtitle {
    font-size: 0.78rem; color: #888; margin-bottom: 14px;
  }
  .warmup-card {
    background: #180f04;
    border: 1px solid #3a2a0e;
    border-left: 3px solid #ffb74d;
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .warmup-card .warmup-head {
    display: flex; justify-content: space-between; align-items: center;
    gap: 10px; flex-wrap: wrap;
  }
  .warmup-img {
    width: 110px; height: 65px; flex-shrink: 0;
    background: #0e0904; border-radius: 8px;
    border: 1px solid #3a2a0e;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .warmup-img svg { width: 100%; height: 100%; display: block; }
  .warmup-card h4 { color: #fff; font-size: 0.92rem; }
  .warmup-card .warmup-target {
    font-size: 0.7rem; color: #ffb74d; text-transform: uppercase;
    letter-spacing: 0.5px; font-weight: 700;
  }
  .warmup-card p {
    color: #999; font-size: 0.8rem; line-height: 1.5; margin-top: 6px;
  }
  .warmup-card .warmup-dose {
    display: inline-block; padding: 4px 10px; border-radius: 6px;
    background: #251c08; color: #ffb74d;
    font-size: 0.72rem; font-weight: 700; margin-top: 8px;
  }
  .warmup-card .warmup-check {
    width: 26px; height: 26px; border-radius: 6px; border: 2px solid #3a2a0e;
    background: transparent; color: #6a5020; font-size: 0.7rem; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
  }
  .warmup-check.done { background: #ffb74d; border-color: #ffb74d; color: #1a1008; }

  .muscle-highlight { fill: #e94560; opacity: 0.85; }
  .muscle-outline { fill: none; stroke: #e94560; stroke-width: 1.5; opacity: 0.6; }
  .body-base { fill: #2a2a4a; }
  .body-outline { fill: none; stroke: #3a3a5a; stroke-width: 1; }

  /* Confirm dialog */
  .confirm-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    display: none; align-items: center; justify-content: center;
    z-index: 1001; backdrop-filter: blur(6px);
  }
  .confirm-overlay.active { display: flex; }
  .confirm-box {
    background: linear-gradient(135deg, #1a1a2e, #2a1a2a);
    border: 2px solid #e94560; border-radius: 16px;
    padding: 24px 28px; text-align: center; max-width: 360px;
  }
  .confirm-box h3 { color: #e94560; font-size: 1.1rem; margin-bottom: 8px; }
  .confirm-box p { color: #ccc; font-size: 0.85rem; margin-bottom: 18px; line-height: 1.5; }
  .confirm-actions { display: flex; gap: 10px; justify-content: center; }
</style>
</head>
<body>

<header>
  <h1>2-WEEK GYM PLAN</h1>
  <p>14 Muscle Groups &bull; 5 Days/Week &bull; 1 Hour/Session</p>
</header>

<div class="week-switch">
  <button class="week-btn active" id="week1Btn">Săptămâna 1</button>
  <button class="week-btn" id="week2Btn">Săptămâna 2</button>
  <button class="reset-btn" id="resetBtn" title="Reset progres pentru săptămâna nouă">&#x21bb; Reset Săptămână Nouă</button>
</div>

<div class="tabs" id="tabs"></div>
<div id="content"></div>

<!-- Rest Timer Modal -->
<div class="timer-overlay" id="timerOverlay">
  <div class="timer-box">
    <div class="timer-label">Pauză</div>
    <div class="timer-display" id="timerDisplay">00:00</div>
    <div class="timer-exercise" id="timerExercise">—</div>
    <div class="timer-actions">
      <button class="timer-action-btn" id="timerAdd">+15s</button>
      <button class="timer-action-btn" id="timerSub">-15s</button>
      <button class="timer-action-btn danger" id="timerSkip">Skip</button>
    </div>
  </div>
</div>

<!-- Reset Confirm Modal -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h3>Săptămână nouă?</h3>
    <p>Toate seturile bifate vor fi resetate. Această acțiune nu poate fi anulată.</p>
    <div class="confirm-actions">
      <button class="timer-action-btn" id="confirmCancel">Anulează</button>
      <button class="timer-action-btn danger" id="confirmYes">Da, resetează</button>
    </div>
  </div>
</div>

<footer>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
  <div class="progress-text"><span class="done-count" id="doneCount">0</span> / <span class="total-count" id="totalCount">0</span> seturi completate</div>
</footer>

<script>
/* ============================================================
   2-WEEK PROGRAM
   Target groups: shoulders, chest, lats, trapezius, lowerback,
   abdominals, quadriceps, hamstrings, calves, abductors,
   adductors, biceps, triceps, forearms
   ============================================================ */
const weeks = [
  /* ---------------------- WEEK 1 ---------------------- */
  {
    label: "Săptămâna 1",
    days: [
      {
        day: "Luni", name: "Chest & Triceps", muscles: "Pectorali, Triceps",
        exercises: [
          { name: "Machine Chest Press", muscle: "Chest", sets: 4, reps: "8-10", rest: "90s", restSec: 90, note: "Apasă mânerele înainte, strânge pieptul la extensia completă", svg: "chest", equipImg: "Leverage_Chest_Press/0.jpg", equipName: "Chest Press" },
          { name: "Incline Machine Press", muscle: "Upper Chest", sets: 4, reps: "10-12", rest: "75s", restSec: 75, note: "Reglează scaunul ca mânerele să fie la nivelul pieptului superior", svg: "chest", equipImg: "Leverage_Incline_Chest_Press/0.jpg", equipName: "Incline Press" },
          { name: "Pec Deck Machine", muscle: "Chest (Isolation)", sets: 3, reps: "12-15", rest: "60s", restSec: 60, note: "Apropie pernuțele lent, strânge 1 secundă", svg: "chest", equipImg: "Butterfly/0.jpg", equipName: "Pec Deck" },
          { name: "Cable Crossovers", muscle: "Inner Chest", sets: 3, reps: "12-15", rest: "60s", restSec: 60, note: "Strânge la contracția maximă, controlează revenirea", svg: "chest", equipImg: "Cable_Crossover/0.jpg", equipName: "Cable Machine" },
          { name: "Tricep Rope Pushdowns", muscle: "Triceps (Lateral)", sets: 3, reps: "12-15", rest: "60s", restSec: 60, note: "Desfă coarda la final, strânge tricepșii", svg: "triceps", equipImg: "Triceps_Pushdown_-_Rope_Attachment/0.jpg", equipName: "Cable Machine" },
          { name: "Cable Overhead Tricep Ext", muscle: "Triceps (Long Head)", sets: 3, reps: "12-15", rest: "60s", restSec: 60, note: "Întins în spate cu cablul, întindere completă", svg: "triceps", equipImg: "Cable_Rope_Overhead_Triceps_Extension/0.jpg", equipName: "Cable Machine" },
          { name: "Tricep Dip Machine", muscle: "Triceps", sets: 3, reps: "12", rest: "45s", restSec: 45, note: "Torsul drept, apasă în jos complet", svg: "triceps", equipImg: "Dip_Machine/0.jpg", equipName: "Dip Machine" },
        ]
      },
      {
        day: "Marți", name: "Back & Biceps & Forearms", muscles: "Lats, Biceps, Antebrațe",
        exercises: [
          { name: "Lat Pulldown (Wide Grip)", muscle: "Lats", sets: 4, reps: "8-10", rest: "90s", restSec: 90, note: "Trage la pieptul superior, aplecă-te ușor pe spate", svg: "lats", equipImg: "Wide-Grip_Lat_Pulldown/0.jpg", equipName: "Lat Pulldown" },
          { name: "Seated Cable Row", muscle: "Mid Back / Lats", sets: 4, reps: "10-12", rest: "75s", restSec: 75, note: "Trage la pieptul inferior, retrage scapulele", svg: "lats", equipImg: "Seated_Cable_Rows/0.jpg", equipName: "Cable Row" },
          { name: "Machine Row (Chest Supported)", muscle: "Mid Back", sets: 4, reps: "10-12", rest: "75s", restSec: 75, note: "Împinge coatele înapoi, strânge omoplații", svg: "lats", equipImg: "Leverage_High_Row/0.jpg", equipName: "Row Machine" },
          { name: "Straight-Arm Pulldown", muscle: "Lats (Isolation)", sets: 3, reps: "12-15", rest: "60s", restSec: 60, note: "Brațele drepte, trage bara până la coapse", svg: "lats", equipImg: "Straight-Arm_Pulldown/0.jpg", equipName: "Cable Machine" },
          { name: "Machine Bicep Curl", muscle: "Biceps", sets: 3, reps: "10-12", rest: "60s", restSec: 60, note: "Amplitudine completă, negativă lentă", svg: "biceps", equipImg: "Machine_Bicep_Curl/0.jpg", equipName: "Curl Machine" },
          { name: "Cable Hammer Curls (Rope)", muscle: "Brachialis", sets: 3, reps: "12", rest: "60s", restSec: 60, note: "Priză neutră pe coardă, strânge sus", svg: "biceps", equipImg: "Cable_Hammer_Curls_-_Rope_Attachment/0.jpg", equipName: "Cable Machine" },
          { name: "Cable Wrist Curls", muscle: "Forearms", sets: 3, reps: "20", rest: "45s", restSec: 45, note: "Antebrațele pe genunchi, rulează încheieturile sus", svg: "forearms", equipImg: "Cable_Wrist_Curl/0.jpg", equipName: "Cable Machine" },
        ]
      },
      {
        day: "Miercuri", name: "Quads, Adductors & Calves", muscles: "Cvadricepși, Adductori, Gambe, Abdomen",
        exercises: [

const EQUIP_BASE = "https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/";
const STORAGE_KEY = 'gymProgress2W';
const WEIGHTS_KEY = 'gymWeights2W';

const WEIGHT_OPTIONS = [];
for (let kg = 5; kg <= 50; kg += 5) WEIGHT_OPTIONS.push(kg);

function getWeights() {
  return JSON.parse(localStorage.getItem(WEIGHTS_KEY) || '{}');
}
function saveWeights(w) {
  localStorage.setItem(WEIGHTS_KEY, JSON.stringify(w));
}
function setWeight(key, value) {
  const w = getWeights();
  if (value === '' || value === null) {
    delete w[key];
  } else {
    w[key] = value;
  }
  saveWeights(w);
}

function buildWeightSelect(key, current) {
  let opts = `<option value="">—</option>`;
  WEIGHT_OPTIONS.forEach(v => {
    const sel = (String(current) === String(v)) ? ' selected' : '';
    opts += `<option value="${v}"${sel}>${v} kg</option>`;
  });
  return `<select class="weight-select" data-key="${key}" onchange="setWeight(this.dataset.key, this.value)">${opts}</select>`;
}

let activeWeek = parseInt(localStorage.getItem('activeWeek') || '0', 10);
if (![0,1].includes(activeWeek)) activeWeek = 0;

function getProgress() {
  return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
}
function saveProgress(p) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(p));
}

function render() {
  const tabs = document.getElementById('tabs');
  const content = document.getElementById('content');
  tabs.innerHTML = '';
  content.innerHTML = '';

  const week = weeks[activeWeek];
  const progress = getProgress();
  const weights = getWeights();

  week.days.forEach((day, di) => {
    const tab = document.createElement('div');
    tab.className = 'tab' + (di === 0 ? ' active' : '');
    tab.innerHTML = `<span class="day-label">${day.day}</span>${day.name.split(' & ')[0].split(' (')[0]}`;
    tab.onclick = () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.day-content').forEach(d => d.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('day-' + di).classList.add('active');
    };
    tabs.appendChild(tab);

    const section = document.createElement('div');
    section.className = 'day-content' + (di === 0 ? ' active' : '');
    section.id = 'day-' + di;

    let html = `<div class="day-header">
      <h2>${day.day} — ${day.name}</h2>
      <div class="muscles-targeted">${day.muscles}</div>
      <div class="duration">⏱ Durată: ~1 oră</div>
    </div>`;

    // ----- Warm-up (în fiecare zi, înainte de antrenament) -----
    html += `<div class="warmup-section">
      <h3>🔥 Încălzire Corporală</h3>
      <div class="warmup-subtitle">Rutină zilnică (~5-8 min) înainte de antrenament — activează musculatura, crește temperatura corpului și previne accidentările</div>`;
    warmupExercises.forEach((wu, wi) => {
      const wuKey = `w${activeWeek}d${di}wu${wi}`;
      const wuDone = progress[wuKey] ? ' done' : '';
      html += `<div class="warmup-card">
        <div class="warmup-head">
          <div class="warmup-img">${warmupSVGs[wu.svg] || ''}</div>
          <div style="flex:1;min-width:140px">
            <div class="warmup-target">${wu.target}</div>
            <h4>${wu.name}</h4>
          </div>
          <button class="warmup-check${wuDone}" data-key="${wuKey}" onclick="toggleSet(this)">${wuDone ? '&#10003;' : '✓'}</button>
        </div>
        <p>${wu.note}</p>
        <span class="warmup-dose">${wu.dose}</span>
      </div>`;
    });
    html += `</div>`;

    day.exercises.forEach((ex, ei) => {
      const key = `w${activeWeek}d${di}e${ei}`;
      html += `<div class="exercise-card">
        <div class="exercise-top">
          <div class="muscle-img">${muscleSVGs[ex.svg] || ''}</div>
          <div class="exercise-info">
            <div class="muscle-name">${ex.muscle}</div>
            <h3>${ex.name}</h3>
            <div class="sets-reps">
              <span class="badge sets">${ex.sets} Seturi</span>
              <span class="badge reps">${ex.reps} Reps</span>
              <span class="badge rest">Pauză ${ex.rest}</span>
            </div>
          </div>
          <div class="equip-img" title="${ex.equipName||''}"><img src="${EQUIP_BASE}${ex.equipImg}" alt="${ex.equipName||''}" loading="lazy" onerror="this.style.display='none'"/><div class="equip-label">${ex.equipName||''}</div></div>
        </div>
        <div class="exercise-note">${ex.note}</div>
        <div class="weight-row">
          <div class="weight-box start">
            <span class="weight-label">🚀 Start (kg)</span>
            ${buildWeightSelect(`start_${key}`, weights[`start_${key}`])}
          </div>
          <div class="weight-box last">
            <span class="weight-label">🏁 Ultima serie (kg)</span>
            ${buildWeightSelect(`last_${key}`, weights[`last_${key}`])}
          </div>
        </div>
        <div class="progress-row">`;
      for (let s = 1; s <= ex.sets; s++) {
        const setKey = `${key}s${s}`;
        const done = progress[setKey] ? ' done' : '';
        html += `<button class="set-check${done}" data-key="${setKey}" onclick="toggleSet(this)">${done ? '&#10003;' : s}</button>`;
      }
      html += `<button class="rest-btn" onclick="startRest(${ex.restSec}, '${ex.name.replace(/'/g, "\\'")}')">&#9201; Pornire pauză ${ex.rest}</button>`;
      html += `</div></div>`;
    });

    // ----- Spine & Sciatic Recovery (in fiecare zi) -----
    html += `<div class="spine-section">
      <h3>🧘 Recuperare Coloană & Nerv Sciatic</h3>
      <div class="spine-subtitle">Rutină zilnică (~8-10 min) la finalul antrenamentului — pentru susținerea L1-L5 și ameliorarea sciaticii</div>`;
    spineRecovery.forEach((sp, si) => {
      const spKey = `w${activeWeek}d${di}sp${si}`;
      const spDone = progress[spKey] ? ' done' : '';
      html += `<div class="spine-card">
        <div class="spine-head">
          <div class="spine-img">${spineSVGs[sp.svg] || ''}</div>
          <div style="flex:1;min-width:140px">
            <div class="spine-target">${sp.target}</div>
            <h4>${sp.name}</h4>
          </div>
          <button class="spine-check${spDone}" data-key="${spKey}" onclick="toggleSet(this)">${spDone ? '&#10003;' : '✓'}</button>
        </div>
        <p>${sp.note}</p>
        <span class="spine-dose">${sp.dose}</span>
      </div>`;
    });
    html += `</div>`;

    section.innerHTML = html;
    content.appendChild(section);
  });

  updateProgress();
}

function getTotalSets() {
  let total = 0;
  weeks[activeWeek].days.forEach(day => {
    day.exercises.forEach(ex => total += ex.sets);
    total += spineRecovery.length; // include exercițiile de recuperare zilnice
    total += warmupExercises.length; // include exercițiile de încălzire zilnice
  });
  return total;
}

function getDoneSets() {
  const progress = getProgress();
  const prefix = `w${activeWeek}`;
  return Object.keys(progress).filter(k => k.startsWith(prefix)).length;
}

function updateProgress() {
  const done = getDoneSets();
  const total = getTotalSets();
  document.getElementById('doneCount').textContent = done;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('progressBar').style.width = (total ? (done / total * 100) : 0) + '%';
}

function toggleSet(btn) {
  const key = btn.dataset.key;
  const progress = getProgress();
  if (progress[key]) {
    delete progress[key];
    btn.classList.remove('done');
    btn.innerHTML = key.split('s').pop();
  } else {
    progress[key] = true;
    btn.classList.add('done');
    btn.innerHTML = '&#10003;';
  }
  saveProgress(progress);
  updateProgress();
}

/* -------------- WEEK SWITCH -------------- */
document.getElementById('week1Btn').onclick = () => switchWeek(0);
document.getElementById('week2Btn').onclick = () => switchWeek(1);

function switchWeek(i) {
  activeWeek = i;
  localStorage.setItem('activeWeek', i);
  document.getElementById('week1Btn').classList.toggle('active', i === 0);
  document.getElementById('week2Btn').classList.toggle('active', i === 1);
  render();
}

/* -------------- RESET BUTTON -------------- */
const confirmOverlay = document.getElementById('confirmOverlay');
document.getElementById('resetBtn').onclick = () => confirmOverlay.classList.add('active');
document.getElementById('confirmCancel').onclick = () => confirmOverlay.classList.remove('active');
document.getElementById('confirmYes').onclick = () => {
  localStorage.removeItem(STORAGE_KEY);
  confirmOverlay.classList.remove('active');
  render();
};

/* -------------- REST TIMER -------------- */
let timerInterval = null;
let timerSecondsLeft = 0;
const timerOverlay = document.getElementById('timerOverlay');
const timerDisplay = document.getElementById('timerDisplay');
const timerExercise = document.getElementById('timerExercise');

function formatTime(s) {
  const m = Math.floor(s / 60).toString().padStart(2, '0');
  const sec = (s % 60).toString().padStart(2, '0');
  return `${m}:${sec}`;
}

function updateTimerDisplay() {
  timerDisplay.textContent = formatTime(timerSecondsLeft);
}

function startRest(seconds, exerciseName) {
  timerSecondsLeft = seconds;
  timerExercise.textContent = exerciseName;
  updateTimerDisplay();
  timerOverlay.classList.add('active');
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(tick, 1000);
}

function tick() {
  timerSecondsLeft--;
  if (timerSecondsLeft <= 0) {
    timerSecondsLeft = 0;
    updateTimerDisplay();
    clearInterval(timerInterval);
    timerInterval = null;
    playBeep();
    setTimeout(() => timerOverlay.classList.remove('active'), 1500);
    return;
  }
  updateTimerDisplay();
}

document.getElementById('timerAdd').onclick = () => { timerSecondsLeft += 15; updateTimerDisplay(); };
document.getElementById('timerSub').onclick = () => {
  timerSecondsLeft = Math.max(1, timerSecondsLeft - 15); updateTimerDisplay();
};
document.getElementById('timerSkip').onclick = () => {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  timerOverlay.classList.remove('active');
};

function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sine'; o.frequency.value = 880;
    g.gain.setValueAtTime(0.001, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.3, ctx.currentTime + 0.01);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
    o.start(); o.stop(ctx.currentTime + 0.9);
  } catch (e) {}
  if (navigator.vibrate) navigator.vibrate([200, 80, 200]);
}

render();
// Set initial week button state
document.getElementById('week1Btn').classList.toggle('active', activeWeek === 0);
document.getElementById('week2Btn').classList.toggle('active', activeWeek === 1);
</script>
